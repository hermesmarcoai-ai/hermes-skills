name: weather
version: 2.1.0
description: >
  Weather data, radar/model imagery, and verified meteorological calculations.
  Built on metrust, rusbie, wrf-rust, rustdar, and ecape-rs.
provides_tools:
  - wx_conditions
  - wx_forecast
  - wx_alerts
  - wx_metar
  - wx_brief
  - wx_global
  - wx_severe
  - wx_model_image
  - wx_radar_image
  - wx_storm_image
  - wx_calc
  - wx_sounding
  - wx_ecape
